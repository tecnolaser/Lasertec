<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de administracion — LaserTec</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="/" class="logo">LASER<span class="dot">•</span>TEC</a>
    <nav class="nav" style="display:flex">
      <a href="/">Ver sitio</a>
      <span data-auth-slot class="nav-auth-slot"></span>
    </nav>
  </div>
</header>

<section style="padding-top:48px">
  <div class="container">
    <h1>Panel de administracion</h1>
    <div id="guard"></div>

    <div id="panel" style="display:none">
      <div class="tabs">
        <button class="tab-btn active" data-tab="pedidos">Pedidos</button>
        <button class="tab-btn" data-tab="precios">Parametros de precio</button>
        <button class="tab-btn" data-tab="contactos">Consultas</button>
        <button class="tab-btn" data-tab="admins">Administradores</button>
      </div>

      <div class="tab-panel active" id="tab-pedidos">
        <div id="pedidos-content">Cargando...</div>
      </div>

      <div class="tab-panel" id="tab-precios">
        <p style="color:var(--text-1)">Cambia estos valores y se recalcula el precio de todo el catalogo al instante.</p>
        <div id="precios-content">Cargando...</div>
      </div>

      <div class="tab-panel" id="tab-contactos">
        <div id="contactos-content">Cargando...</div>
      </div>

      <div class="tab-panel" id="tab-admins">
        <div id="admins-content">Cargando...</div>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <span>© LaserTec — Corte laser industrial</span>
    <span class="mono">Panel interno</span>
  </div>
</footer>

<script src="/js/cart.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
