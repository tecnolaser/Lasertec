<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago aprobado — LaserTec</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header"><div class="container">
  <a href="/" class="logo">LASER<span class="dot">•</span>TEC</a>
</div></header>
<section style="padding-top:64px" class="center">
  <div class="container" style="max-width:560px">
    <div class="badge" style="border-color:var(--ok);color:var(--ok)">Pago aprobado</div>
    <h1 style="margin-top:18px">Gracias por tu pedido</h1>
    <p id="detalle" style="color:var(--text-1)">Cargando el detalle de tu pedido...</p>
    <a href="/" class="btn btn-outline" style="margin-top:24px">Volver al catalogo</a>
  </div>
</section>
<script src="/js/cart.js"></script>
<script>
  clearCart();
  const orderId = new URLSearchParams(location.search).get("order");
  if (orderId) {
    fetch(`/api/orders/${orderId}`).then(r => r.json()).then(o => {
      document.getElementById("detalle").textContent =
        `Pedido ${o.id?.slice(0,8)} · Total $${(o.total||0).toLocaleString("es-AR")} · Te vamos a contactar a ${o.cliente?.email || "tu email"} para coordinar la entrega.`;
    }).catch(() => {
      document.getElementById("detalle").textContent = "Tu pago fue aprobado. Te vamos a contactar para coordinar la entrega.";
    });
  }
</script>
</body>
</html>
