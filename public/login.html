<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesion — LaserTec</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="/" class="logo">LASER<span class="dot">•</span>TEC</a>
    <nav class="nav" style="display:flex">
      <a href="/">Inicio</a>
      <a href="/contacto.html">Contacto</a>
    </nav>
  </div>
</header>

<section style="padding-top:64px;padding-bottom:64px">
  <div class="container" style="max-width:420px">
    <h1>Iniciar sesion</h1>
    <p style="color:var(--text-1);margin-bottom:24px">Ingresa para ver el historial de tus pedidos.</p>
    <div id="alert-box"></div>
    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Ingresar</button>
    </form>
    <p style="margin-top:20px;color:var(--text-2);font-size:.9rem">
      No tenes cuenta? <a href="/registro.html" style="color:var(--beam)">Crear una cuenta</a>
    </p>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <span>© LaserTec — Corte laser industrial</span>
    <span class="mono">Pagos procesados por Mercado Pago</span>
  </div>
</footer>

<script src="/js/auth.js"></script>
<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const alertBox = document.getElementById("alert-box");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      alertBox.innerHTML = `<div class="alert error">${data.error}</div>`;
      return;
    }
    saveAuth(data.token, data.user);
    location.href = data.user.role === "admin" ? "/admin.html" : "/mi-cuenta.html";
  } catch {
    alertBox.innerHTML = `<div class="alert error">Error de conexion con el servidor.</div>`;
  }
});
</script>
</body>
</html>
